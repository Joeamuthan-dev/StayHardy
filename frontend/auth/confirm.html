<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" 
content="0;url=/verified.html">
<title>Redirecting...</title>
<style>
  body {
    background: #080C0A;
    margin: 0;
  }
</style>
</head>
<body>
<script>
  // Grab the hash/token from URL
  const hash = window.location.hash
  const search = window.location.search
  
  // Redirect to verified page with params
  window.location.replace(
    '/verified.html' + search + hash
  )
</script>
</body>
</html>
